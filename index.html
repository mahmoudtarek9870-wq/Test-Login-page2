<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/master.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
    <script src="JS/main.js"></script>
</head>

<body>

    <div class="login">
        <div class="login-title">
            <h3>Login Or Sign up</h3>
        </div>

        <div class="form">
            <form action="../submit.jpeg">
                <input type="email" name="email" id="email" placeholder="Email address" required class="input" maxlength="35"> 
                <input type="password" name="password" placeholder="Password" class="password" required class="input" minlength="8" maxlength="25">
                <a href="#">
                    Forgot password
                </a>

                <input type="submit" name="submit" class="submit" value="Login">
            </form>
        </div>
    </div>

</body>

</html>
